<!DOCTYPE html>
<html lang="en">

    <style>
        .navbar-custom {
            background-color: white;
            padding: 12px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }


        .logo-img {
            height: 50px;
            width: 50px;
        }


        .navbar-nav .nav-link {
            color: black !important;
            font-size: 14px;
            letter-spacing: 1px;
            padding: 0 15px !important;
        }

        .navbar-nav .nav-link:hover {
            border-bottom: 1px solid black;
        }


        .icon-group i {
            font-size: 18px;
            cursor: pointer;
        }

        .icon-group i:hover {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">

        <div class="container-fluid position-relative">


            <a class="navbar-brand" href="#">

                <img src="download.png" alt="H&M Logo" class="logo-img">
            </a>


            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="project.html">LADIES</a></li>
                    <li class="nav-item"><a class="nav-link" href="mens.html">MEN</a></li>
                    <li class="nav-item"><a class="nav-link" href="kids.html">KIDS</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">BEAUTY</a></li>
                </ul>
            </div>


            <div class="icon-group d-flex gap-4">
                <i class="bi bi-search"></i>
                <i class="bi bi-person"></i>
            </div>

        </div>

    </nav>

    <button type="button" class="btn btn-primary ms-5  mt-5" data-bs-toggle="modal" data-bs-target="#loginModal">
        Open Sign In
    </button>


    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">

                <div class="modal-header border-0">
                    <h5 class="modal-title">SIGN IN</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p class="fw-semibold">
                        Sign in with your email or sign up to become an H&M member.
                    </p>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" placeholder="Email">
                        </div>

                        <button type="submit" class="btn btn-dark w-100 mb-3">
                            CONTINUE
                        </button>

                        <div class="text-center small">
                            🔒 All data is kept secure
                        </div>

                        <div class="text-center mt-3">
                            <a href="#" class="text-decoration-underline text-dark">
                                H&M MEMBERSHIP
                            </a>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
